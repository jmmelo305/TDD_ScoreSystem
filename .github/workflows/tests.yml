name: CI Pipeline

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - run: pip install pytest pytest-cov flake8
      - run: pytest --cov=. --cov-fail-under=85
      - run: flake8 .
